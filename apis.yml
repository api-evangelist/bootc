aid: bootc
name: Bootc
description: >-
  Bootc is an open source tool that enables transactional, in-place operating system
  updates using OCI/Docker container images as the source for OS updates. It applies
  the container layering model to bootable host systems, using standard OCI containers
  as a transport and delivery format for base operating system updates. The container
  image includes a Linux kernel, and when deployed the base userspace runs normally
  with systemd as PID 1. Bootc is a CNCF Sandbox project with a stable CLI and API.
